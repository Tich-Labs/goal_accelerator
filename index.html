<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal Accelerator</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="A minimalist PWA to define goals, build habits, and track progress.">

  <!-- Icons -->
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.png">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- Main App Container -->
  <div id="app" class="min-h-screen">
    <!-- Views will be rendered here by router -->
  </div>

  <!-- Main App Entry Point -->
  <script type="module" src="./js/router.js"></script>

  <!-- Global Reset Function (for debugging) -->
  <script>
    window.resetApp = function() {
      if (confirm('Reset all data and start fresh?')) {
        localStorage.clear();
        location.reload();
      }
    }
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').then(
          registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          },
          error => {
            console.error('Service Worker registration failed:', error);
          }
        );
      });
    }
  </script>
</body>
</html>
